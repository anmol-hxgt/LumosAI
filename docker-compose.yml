services:
  db:
    image: pgvector/pgvector:pg17
    container_name: lumosai-pg
    environment:
      POSTGRES_PASSWORD: lumos123
      POSTGRES_DB: lumosai
    ports:
      - "5432:5432"
    volumes:
      - lumosai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: lumosai-app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  lumosai_pgdata: