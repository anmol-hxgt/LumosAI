<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LumosAI — Code Intelligence Platform</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e6e6e6;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 300px;
    min-width: 300px;
    background: #14171f;
    border-right: 1px solid #262a35;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid #262a35;
  }
  #sidebar-header h1 {
    font-size: 17px;
    margin: 0 0 4px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  #sidebar-header .badge {
    font-size: 10.5px;
    color: #8b93a7;
  }

  #index-section {
    padding: 14px 20px;
    border-bottom: 1px solid #262a35;
  }
  #repo-url {
    width: 100%;
    background: #1a1f2e;
    border: 1px solid #2d3348;
    color: #e6e6e6;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 12px;
    outline: none;
    margin-bottom: 8px;
  }
  #repo-url:focus { border-color: #6d7fff; }
  #index-btn {
    width: 100%;
    padding: 8px 0;
    font-size: 12.5px;
  }
  #index-status {
    font-size: 11px;
    margin-top: 8px;
    color: #8b93a7;
    line-height: 1.4;
  }
  #index-status.error { color: #f87171; }
  #index-status.success { color: #7ee787; }

  #stats {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    border-bottom: 1px solid #262a35;
  }
  .stat-card {
    background: #1a1f2e;
    border: 1px solid #262a35;
    border-radius: 10px;
    padding: 10px 12px;
  }
  .stat-card .num {
    font-size: 20px;
    font-weight: 700;
    color: #9db4ff;
  }
  .stat-card .label {
    font-size: 10.5px;
    color: #8b93a7;
    margin-top: 2px;
  }

  #lang-breakdown {
    padding: 12px 20px;
    border-bottom: 1px solid #262a35;
    font-size: 12px;
  }
  #lang-breakdown .title {
    color: #8b93a7;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .lang-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    color: #c9cedb;
  }
  .lang-row .count { color: #6d7fff; font-weight: 600; }

  #files-section {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 20px;
  }
  #files-section .title {
    color: #8b93a7;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    position: sticky;
    top: 0;
    background: #14171f;
    padding-top: 4px;
  }
  .file-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12.5px;
    font-family: "Consolas", monospace;
    color: #c9cedb;
    cursor: default;
  }
  .file-row:hover { background: #1a1f2e; cursor: pointer; }
  .file-row .chunk-count {
    font-size: 10.5px;
    background: #232838;
    color: #8b93a7;
    padding: 1px 7px;
    border-radius: 10px;
  }

  /* ---------- Source viewer modal ---------- */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #14171f;
    border: 1px solid #262a35;
    border-radius: 12px;
    width: 720px;
    max-width: 90vw;
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #modal-header {
    padding: 14px 20px;
    border-bottom: 1px solid #262a35;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #modal-header .path {
    font-family: "Consolas", monospace;
    font-size: 13px;
    color: #9db4ff;
  }
  #modal-close {
    background: none;
    color: #8b93a7;
    padding: 2px 8px;
    font-size: 16px;
  }
  #modal-close:hover { background: #232838; color: #e6e6e6; }
  #modal-body {
    overflow-y: auto;
    padding: 12px 20px 20px;
  }
  .chunk-block {
    margin-bottom: 14px;
    border: 1px solid #262a35;
    border-radius: 8px;
    overflow: hidden;
  }
  .chunk-block-header {
    background: #1a1f2e;
    padding: 6px 12px;
    font-size: 11.5px;
    color: #9db4ff;
    font-family: "Consolas", monospace;
  }
  .chunk-block pre {
    margin: 0;
    padding: 10px 12px;
    font-size: 12px;
    font-family: "Consolas", monospace;
    overflow-x: auto;
    color: #c9cedb;
    white-space: pre-wrap;
  }

  /* ---------- Main chat area ---------- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { max-width: 100%; }
  .msg.user {
    align-self: flex-end;
    background: #2d3348;
    padding: 10px 16px;
    border-radius: 14px 14px 2px 14px;
    max-width: 70%;
  }
  .msg.agent {
    align-self: flex-start;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .tool-call {
    font-size: 12px;
    color: #7ee787;
    background: #0d1b12;
    border: 1px solid #1e3a26;
    padding: 4px 10px;
    border-radius: 6px;
    display: inline-block;
    margin: 4px 0;
  }
  .citation {
    display: inline-block;
    font-size: 12px;
    background: #1a1f2e;
    color: #9db4ff;
    padding: 1px 7px;
    border-radius: 4px;
    font-family: "Consolas", monospace;
    cursor: pointer;
    border: 1px solid #2d3348;
  }
  .sources-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    font-size: 11.5px;
  }
  .sources-row .label {
    color: #8b93a7;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .source-pill {
    background: #1a1f2e;
    border: 1px solid #2d3348;
    color: #9db4ff;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: "Consolas", monospace;
    cursor: pointer;
  }
  .source-pill:hover { background: #232838; border-color: #4f5eff; }
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #4a5066;
    text-align: center;
    gap: 6px;
  }
  #empty-state .big { font-size: 15px; color: #8b93a7; }
  #empty-state .small { font-size: 12.5px; }

  #inputbar {
    border-top: 1px solid #262a35;
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  #question {
    flex: 1;
    background: #1a1f2e;
    border: 1px solid #2d3348;
    color: #e6e6e6;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }
  #question:focus { border-color: #6d7fff; }
  button {
    background: #4f5eff;
    color: white;
    border: none;
    padding: 0 20px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  button:hover { background: #6d7fff; }
  button:disabled { background: #2d3348; cursor: not-allowed; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>LumosAI</h1>
    <div class="badge">AI-Powered Code Intelligence Platform</div>
  </div>

  <div id="index-section">
    <input id="repo-url" type="text" placeholder="https://github.com/owner/repo" />
    <button id="index-btn" onclick="indexRepo()">Index Repository</button>
    <div id="index-status"></div>
  </div>

  <div id="stats">
    <div class="stat-card">
      <div class="num" id="stat-files">–</div>
      <div class="label">Files indexed</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-chunks">–</div>
      <div class="label">Chunks stored</div>
    </div>
  </div>

  <div id="lang-breakdown">
    <div class="title">By Language</div>
    <div id="lang-rows"></div>
  </div>

  <div id="files-section">
    <div class="title">Indexed Files</div>
    <div id="file-rows"></div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div id="modal">
    <div id="modal-header">
      <span class="path" id="modal-path"></span>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="main">
  <div id="chat">
    <div id="empty-state">
      <div class="big">Ask anything about the indexed codebase</div>
      <div class="small">e.g. "How does session handling work?" or "What calls prepare_request?"</div>
    </div>
  </div>

  <div id="inputbar">
    <input id="question" type="text" placeholder="Ask something about the indexed codebase..." />
    <button id="sendBtn" onclick="sendQuestion()">Send</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("question");
const sendBtn = document.getElementById("sendBtn");
let emptyStateRemoved = false;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendQuestion();
});

// ---------- Dashboard loading ----------
async function loadStats() {
  try {
    const res = await fetch("/api/stats");
    const data = await res.json();

    document.getElementById("stat-files").textContent = data.total_files;
    document.getElementById("stat-chunks").textContent = data.total_chunks;

    const langRows = document.getElementById("lang-rows");
    langRows.innerHTML = "";
    data.language_breakdown.forEach((row) => {
      const div = document.createElement("div");
      div.className = "lang-row";
      div.innerHTML = `<span>${row.language}</span><span class="count">${row.count}</span>`;
      langRows.appendChild(div);
    });
  } catch (err) {
    console.error("Failed to load stats:", err);
  }
}

async function loadFiles() {
  try {
    const res = await fetch("/api/files");
    const data = await res.json();

    const fileRows = document.getElementById("file-rows");
    fileRows.innerHTML = "";
    data.files.forEach((f) => {
      const div = document.createElement("div");
      div.className = "file-row";
      const shortName = f.file_path.split(/[\\/]/).pop();
      div.innerHTML = `<span title="${f.file_path}">${shortName}</span><span class="chunk-count">${f.chunk_count}</span>`;
      div.onclick = () => openFileViewer(f.file_path);
      fileRows.appendChild(div);
    });
  } catch (err) {
    console.error("Failed to load files:", err);
  }
}

// ---------- Source viewer modal ----------
async function openFileViewer(filePath) {
  const overlay = document.getElementById("modal-overlay");
  const body = document.getElementById("modal-body");
  document.getElementById("modal-path").textContent = filePath;
  body.innerHTML = "<div style='color:#8b93a7;font-size:13px;'>Loading...</div>";
  overlay.classList.add("open");

  try {
    const res = await fetch(`/api/files/chunks?file_path=${encodeURIComponent(filePath)}`);
    const data = await res.json();

    body.innerHTML = "";
    data.chunks.forEach((chunk) => {
      const block = document.createElement("div");
      block.className = "chunk-block";

      const label = chunk.symbol_name
        ? `${chunk.symbol_type} ${chunk.symbol_name}${chunk.parent_symbol ? ` (in ${chunk.parent_symbol})` : ""}`
        : chunk.symbol_type;

      block.innerHTML = `
        <div class="chunk-block-header">${label} — lines ${chunk.start_line}-${chunk.end_line}</div>
        <pre></pre>
      `;
      block.querySelector("pre").textContent = chunk.content;
      body.appendChild(block);
    });
  } catch (err) {
    body.innerHTML = `<div style="color:#f87171;">Failed to load file: ${err.message}</div>`;
  }
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

// ---------- Repo indexing ----------
async function indexRepo() {
  const urlInput = document.getElementById("repo-url");
  const btn = document.getElementById("index-btn");
  const status = document.getElementById("index-status");

  const repoUrl = urlInput.value.trim();
  if (!repoUrl) return;

  btn.disabled = true;
  status.className = "";
  status.textContent = "Cloning and indexing... this can take a few minutes for larger repos.";

  try {
    const res = await fetch("/api/index-repo", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ repo_url: repoUrl }),
    });
    const data = await res.json();

    if (data.status === "success") {
      status.className = "success";
      status.textContent = `Indexed ${data.repo_name}: ${data.total_files} files, ${data.total_chunks} chunks.`;
      loadStats();
      loadFiles();
    } else {
      status.className = "error";
      status.textContent = data.message || "Indexing failed.";
    }
  } catch (err) {
    status.className = "error";
    status.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
}

loadStats();
loadFiles();

// ---------- Chat ----------
function addUserMessage(text) {
  if (!emptyStateRemoved) {
    document.getElementById("empty-state").remove();
    emptyStateRemoved = true;
  }
  const div = document.createElement("div");
  div.className = "msg user";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function linkifyCitations(text) {
  return text.replace(
    /`?([\w\-\.]+\.py:\d+-\d+)`?/g,
    '<span class="citation">$1</span>'
  );
}

async function sendQuestion() {
  const question = input.value.trim();
  if (!question) return;

  addUserMessage(question);
  input.value = "";
  sendBtn.disabled = true;

  const agentDiv = document.createElement("div");
  agentDiv.className = "msg agent";
  chat.appendChild(agentDiv);

  let rawText = "";

  try {
    const response = await fetch("/query/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = JSON.parse(line.slice(6));

        if (payload.type === "sources") {
          if (payload.files.length > 0) {
            const sourcesDiv = document.createElement("div");
            sourcesDiv.className = "sources-row";
            const label = document.createElement("span");
            label.className = "label";
            label.textContent = "Sources:";
            sourcesDiv.appendChild(label);
            payload.files.forEach((f) => {
              const pill = document.createElement("span");
              pill.className = "source-pill";
              pill.textContent = f.split(/[\\/]/).pop();
              pill.onclick = () => openFileViewer(f);
              sourcesDiv.appendChild(pill);
            });
            agentDiv.appendChild(sourcesDiv);
          }
        } else if (payload.type === "tool_call") {
          const toolSpan = document.createElement("div");
          toolSpan.className = "tool-call";
          toolSpan.textContent = `🔧 called ${payload.tool}(${JSON.stringify(payload.args)})`;
          agentDiv.appendChild(toolSpan);
          agentDiv.appendChild(document.createElement("br"));
        } else if (payload.type === "token") {
          rawText += payload.content;
          const textNode = agentDiv.querySelector(".answer-text") || (() => {
            const el = document.createElement("span");
            el.className = "answer-text";
            agentDiv.appendChild(el);
            return el;
          })();
          textNode.innerHTML = linkifyCitations(rawText);
        }
        chat.scrollTop = chat.scrollHeight;
      }
    }
  } catch (err) {
    agentDiv.textContent = "Error: " + err.message;
  } finally {
    sendBtn.disabled = false;
  }
}
</script>

</body>
</html>
